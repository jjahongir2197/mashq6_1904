<!DOCTYPE html>
<html>
<head>
    <title>Register Form</title>
    <style>
        body {
            font-family: Arial;
            background: lightblue;
            padding: 50px;
        }

        .box {
            width: 400px;
            background: white;
            padding: 20px;
            margin: auto;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: green;
            color: white;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>

<div class="box">

<h2>Register</h2>

<form method="POST">

<input type="text" name="name" placeholder="Enter name">

<input type="email" name="email" placeholder="Enter email">

<input type="password" name="password" placeholder="Enter password">

<button type="submit">Submit</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% if success %}
<p class="success">{{ success }}</p>
{% endif %}

</div>

</body>
</html>
